name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LINK_MODE: copy

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check --output-format=github .
      - name: ruff format
        run: uv run ruff format --check .
      - name: ty check
        run: uv run ty check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --frozen
      - name: pytest
        run: uv run pytest --junit-xml=junit-report.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: junit-report.xml

  # Render each starter and build+test it with a real toolchain, proving the
  # templates produce working projects across all languages. uv fetches its own
  # Python; the job only needs the language toolchain (gradle / cmake / go / …).
  starters:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [python, java, cpp, go, rust, typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - if: matrix.lang == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - if: matrix.lang == 'java'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - if: matrix.lang == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - if: matrix.lang == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # cmake + git are preinstalled on ubuntu-latest; nothing extra for cpp.

      - run: uv sync --frozen
      - name: integration test (${{ matrix.lang }})
        run: uv run pytest -m integration -k ${{ matrix.lang }} -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
