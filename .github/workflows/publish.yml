name: Publish

# Replaces the GitLab CI publish job (which pushed to GitLab's PyPI registry with
# the CI job token). On GitHub the equivalent is PyPI Trusted Publishing over
# OIDC — no long-lived token needed. Configure a trusted publisher for this repo
# on PyPI and create a `pypi` environment before the first tag push.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: build
        run: uv build
      - name: publish to PyPI
        run: uv publish --trusted-publishing always
