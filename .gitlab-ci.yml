stages:
  - lint
  - test
  - starters
  - build
  - publish
  - deploy

default:
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .uv-cache
  before_script:
    - uv sync --frozen

variables:
  UV_CACHE_DIR: .uv-cache
  UV_LINK_MODE: copy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

ruff-lint:
  stage: lint
  script:
    - uv run ruff check --output-format=gitlab . > ruff-report.json
  artifacts:
    reports:
      codequality: ruff-report.json
    when: always

ruff-format:
  stage: lint
  script:
    - uv run ruff format --check .

ty-check:
  stage: lint
  script:
    - uv run ty check

pytest:
  stage: test
  script:
    - uv run pytest --junit-xml=junit-report.xml
  artifacts:
    reports:
      junit: junit-report.xml
    when: always

# Render each starter and build+test it inside the matching language container,
# proving the templates produce working projects across all languages.
# uv is used to run the integration tests; uv fetches its own Python, so the
# base image only needs the language toolchain (gradle / gcc+cmake).
starter-python:
  stage: starters
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  script:
    - uv run pytest -m integration -k python -v
  retry: 1

starter-java:
  stage: starters
  image: gradle:8.7-jdk21
  before_script:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync --frozen
  script:
    - uv run pytest -m integration -k java -v
  retry: 1

starter-cpp:
  stage: starters
  image: gcc:13
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl cmake git
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync --frozen
  script:
    - uv run pytest -m integration -k cpp -v
  retry: 1

starter-go:
  stage: starters
  image: golang:1.22
  before_script:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync --frozen
  script:
    - uv run pytest -m integration -k go -v
  retry: 1

build-package:
  stage: build
  script:
    - uv build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Publishes to this project's GitLab PyPI package registry on version tags.
publish-package:
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - uv publish
      --publish-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi"
      --username gitlab-ci-token
      --password "${CI_JOB_TOKEN}"
      dist/*

pages:
  stage: deploy
  script:
    - uv run mkdocs build --site-dir public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
